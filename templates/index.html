<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>My Flask Blog</title>
</head>
<body>
  <h1>My Blog</h1>
<p><a href="/create">Create a new post</a></p>
  {% for post in posts %}
    <article>
      <h2><a href="/post/{{ post.id }}">{{ post.title }}</a></h2>
      <p>{{ post.content }}</p>
      {% if post.author %}
        <p><em>By {{ post.author }}</em></p>
      {% endif %}
      <hr>
    </article>
  {% endfor %}

</body>
</html>
