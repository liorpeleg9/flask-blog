<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Update Blog Post</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
  <a href="/">← Back</a>
  <h1>Update Blog Post</h1>

  <form action="{{ url_for('update', post_id=post.id) }}" method="post">
    <label for="title">Title</label><br>
    <input type="text" id="title" name="title" value="{{ post.title }}" required><br><br>

    <label for="author">Author</label><br>
    <input type="text" id="author" name="author" value="{{ post.author }}"><br><br>

    <label for="content">Content</label><br>
    <textarea id="content" name="content" rows="6" required>{{ post.content }}</textarea><br><br>

    <button type="submit">Update</button>
  </form>
</body>
</html>
